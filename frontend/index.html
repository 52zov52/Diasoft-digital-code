<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiplomaVerify | Система верификации дипломов</title>
  
  <!-- Шрифт Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Иконки FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Стили -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Хедер с логотипом -->
  <header class="main-header">
    <div class="container header-content">
      <div class="logo">
        <i class="fa-solid fa-shield-halved logo-icon"></i>
        <span>DiplomaVerify</span>
      </div>
      <div class="header-status">
        <span class="badge status-active"><i class="fa-solid fa-check-circle"></i> Система активна</span>
      </div>
    </div>
  </header>

  <!-- Навигация (вкладки) -->
  <nav class="container">
    <div class="tabs" id="role-tabs">
      <!-- Кнопки будут добавлены автоматически через routes.js -->
    </div>
  </nav>

  <!-- Основной контент -->
  <main class="container">
    <div id="app-outlet"></div>
  </main>

  <!-- Контейнер для уведомлений (тостов) -->
  <div id="toast-container"></div>

  <!-- Скрипты -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
