# k8s/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata: { name: dv-config }
data:
  APP_ENV: "production"
  APP_PORT: "8080"
  DB_HOST: "postgres-svc"
  DB_PORT: "5432"
  DB_NAME: "diplomaverify"
  REDIS_URL: "redis://redis-svc:6379/0"
  KAFKA_BROKERS: "kafka-svc:9092"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  CORS_ALLOWED_ORIGINS: "https://diplomaverify.diasoft.ru"
  TZ: "Europe/Moscow"